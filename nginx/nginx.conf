worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream api {
        server server:5000;
    }

    upstream frontend {
        server client:80;
    }

    upstream admin_panel {
        server admin:80;
    }

    # HTTP: ACME-проверка (для продления) + редирект на HTTPS
    server {
        listen 80 default_server;
        server_name tbgroup.kz www.tbgroup.kz;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS: публичный сайт
    server {
        listen 443 ssl;
        http2 on;
        server_name tbgroup.kz www.tbgroup.kz;

        ssl_certificate     /etc/letsencrypt/live/tbgroup.kz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tbgroup.kz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 10M;

        location /api {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        location /uploads {
            proxy_pass http://api;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }

    # Админка — admin.tbgroup.kz (пока HTTP; HTTPS добавим после DNS)
    server {
        listen 80;
        server_name admin.tbgroup.kz;

        client_max_body_size 10M;

        location /api {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        location /uploads {
            proxy_pass http://api;
        }

        location / {
            proxy_pass http://admin_panel;
            proxy_set_header Host $host;
        }
    }
}
