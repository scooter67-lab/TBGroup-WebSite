version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: tbgroup-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    networks:
      - tbgroup-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tbgroup-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    networks:
      - tbgroup-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: tbgroup-client
    restart: unless-stopped
    networks:
      - tbgroup-net

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: tbgroup-admin
    restart: unless-stopped
    networks:
      - tbgroup-net

  nginx:
    image: nginx:alpine
    container_name: tbgroup-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - client
      - admin
    networks:
      - tbgroup-net

volumes:
  mongo_data:
  uploads_data:

networks:
  tbgroup-net:
    driver: bridge
